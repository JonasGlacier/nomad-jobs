<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就业可视化地图</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --fg: #e0e0e8;
  --fg2: #888894;
}
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  text-align: center;
  max-width: 600px;
  padding: 40px 20px;
}
h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 12px;
}
p {
  color: var(--fg2);
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 48px;
}
.cards {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
}
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 220px;
  height: 180px;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  text-decoration: none;
  color: var(--fg);
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover {
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-4px);
}
.card .flag {
  font-size: 48px;
  margin-bottom: 16px;
}
.card .label {
  font-size: 16px;
  font-weight: 600;
}
.card .sub {
  font-size: 12px;
  color: var(--fg2);
  margin-top: 6px;
}
</style>
</head>
<body>
<div class="container">
  <h1>就业可视化地图</h1>
  <p>职业数据可视化 · 面积 = 就业人数</p>
  <div class="cards">
    <a class="card" href="cn/">
      <div class="flag">&#127464;&#127475;</div>
      <div class="label">AI 就业冲击</div>
      <div class="sub">中国 · 147 个职业</div>
    </a>
    <a class="card" href="us/">
      <div class="flag">&#127482;&#127480;</div>
      <div class="label">AI 就业冲击</div>
      <div class="sub">美国 · 342 个职业</div>
    </a>
    <a class="card" href="run/">
      <div class="flag">&#9992;&#65039;</div>
      <div class="label">职业好润度地图</div>
      <div class="sub">中国 · 147 个职业 · 跨国可迁移性</div>
    </a>
  </div>
</div>
</body>
</html>
